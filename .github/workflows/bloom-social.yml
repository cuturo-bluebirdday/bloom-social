name: Bloom Social (daily Instagram)

# v2.0 (2026-07-06)
# Runs daily ~6pm Brisbane. Screenshots the 3 map regions, commits them
# (so they get public raw URLs), then posts them to Instagram.
#
# v2 changes:
# - cron moved OFF the :00 minute (GitHub drops/delays on-the-hour jobs;
#   :00 is the most congested slot). 07:47 UTC = 5:47pm Brisbane; GitHub's
#   own lag typically lands the run right around 6pm.
# - prints the trigger event at the top of every run, so the log itself
#   tells you whether cron or a human started it.
# - concurrency guard so a late cron + manual run can't overlap.

on:
  workflow_dispatch:        # lets you run it manually to test
  schedule:
    - cron: '47 7 * * *'    # 07:47 UTC = 17:47 Brisbane (AEST, no DST)

concurrency:
  group: bloom-social
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write        # needed to commit the screenshots back
    steps:
      - name: Show trigger
        run: |
          echo "Triggered by: ${{ github.event_name }}"
          echo "Branch/ref:  ${{ github.ref_name }}"
          echo "UTC now:     $(date -u)"
          echo "Brisbane:    $(TZ=Australia/Brisbane date)"

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright + Chromium
        run: |
          npm init -y >/dev/null 2>&1 || true
          npm install playwright
          npx playwright install --with-deps chromium

      - name: Screenshot the maps
        run: node shoot.js

      - name: Commit screenshots (gives them public URLs)
        run: |
          git config user.name  "bloom-bot"
          git config user.email "bot@bloombyday.com"
          git add social/
          git commit -m "social: $(TZ=Australia/Brisbane date +%F)" || echo "nothing to commit"
          git pull --rebase origin ${{ github.ref_name }} || true
          git push

      - name: Post to Instagram
        env:
          IG_USER_ID:      ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
        run: node post_instagram.js
