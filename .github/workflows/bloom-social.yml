name: Bloom Social (daily Instagram)
on:
  workflow_dispatch:
  schedule:
    - cron: '0 8 * * *'
concurrency:
  group: bloom-social
  cancel-in-progress: false
jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Playwright + Chromium
        run: |
          npm init -y >/dev/null 2>&1 || true
          npm install playwright
          npx playwright install --with-deps chromium
      - name: Screenshot the maps
        run: node shoot.js
      - name: Commit screenshots (non-fatal)
        continue-on-error: true
        run: |
          git config user.name  "bloom-bot"
          git config user.email "bot@bloombyday.com"
          git add social/ || true
          git commit -m "social: $(TZ=Australia/Brisbane date +%F)" || echo "nothing to commit"
          git pull --rebase origin ${{ github.ref_name }} || echo "rebase skipped"
          git push || echo "push failed (non-fatal)"
      - name: Post to Instagram
        env:
          IG_USER_ID:      ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
        run: node post_instagram.js
