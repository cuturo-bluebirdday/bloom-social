name: Bloom Social (weekly Instagram)
# v2.4 (2026-07-22)
# Runs WEEKLY on Wednesday 3am Brisbane — same slot as Bluebird — so both apps
# post together and the grid stays in sync. Screenshots 3 map regions, commits
# them for public raw URLs, then posts to Instagram.
#
# v2.4: Changed from daily 6pm to weekly Wed 3am Brisbane (same as Bluebird).
# v2.3: SIMPLIFIED — self-contained single schedule, no cross-repo ig-trigger.
# v2.2: removed own schedule (was double-posting with ig-trigger).
# v2.1: commit/push step continue-on-error so a repo race can't kill the IG post.
on:
  workflow_dispatch:          # manual runs — fire it by hand to test on demand
  schedule:
    - cron: '0 17 * * 2'      # Tue 17:00 UTC = Wed 3am Brisbane — weekly, same slot as Bluebird
concurrency:
  group: bloom-social
  cancel-in-progress: false
jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Show trigger
        run: |
          echo "Triggered by: ${{ github.event_name }}"
          echo "Branch/ref:  ${{ github.ref_name }}"
          echo "UTC now:     $(date -u)"
          echo "Brisbane:    $(TZ=Australia/Brisbane date)"
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Playwright + Chromium
        run: |
          npm init -y >/dev/null 2>&1 || true
          npm install playwright
          npx playwright install --with-deps chromium
      - name: Screenshot the maps
        run: node shoot.js
      - name: Commit screenshots (non-fatal)
        continue-on-error: true
        run: |
          git config user.name  "bloom-bot"
          git config user.email "bot@bloombyday.com"
          git add social/ || true
          git commit -m "social: $(TZ=Australia/Brisbane date +%F)" || echo "nothing to commit"
          git pull --rebase origin ${{ github.ref_name }} || echo "rebase skipped"
          git push || echo "push failed (non-fatal) — images still available from prior commit"
      - name: Post to Instagram
        env:
          IG_USER_ID:      ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
        run: node post_instagram.js
