name: Bloom Social (daily Instagram)
# v2.1 (2026-07-07)
# Runs daily ~6pm Brisbane. Screenshots 3 map regions, commits them for public
# raw URLs, then posts to Instagram. HARDENED so a git push conflict (another
# cron committing at the same time) can NEVER block the Instagram post.
#
# v2.1 changes:
# - Commit/push step is now continue-on-error + every git cmd non-fatal, so a
#   repo race can't fail the job before the IG post runs. (Suspected cause of
#   scheduled runs not posting: commit/push died, killing the job pre-post.)
on:
  workflow_dispatch:        # manual test
  schedule:
    - cron: '47 7 * * *'    # 07:47 UTC = 17:47 Brisbane (AEST, no DST)
concurrency:
  group: bloom-social
  cancel-in-progress: false
jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Show trigger
        run: |
          echo "Triggered by: ${{ github.event_name }}"
          echo "Branch/ref:  ${{ github.ref_name }}"
          echo "UTC now:     $(date -u)"
          echo "Brisbane:    $(TZ=Australia/Brisbane date)"

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright + Chromium
        run: |
          npm init -y >/dev/null 2>&1 || true
          npm install playwright
          npx playwright install --with-deps chromium

      - name: Screenshot the maps
        run: node shoot.js

      - name: Commit screenshots (non-fatal)
        continue-on-error: true
        run: |
          git config user.name  "bloom-bot"
          git config user.email "bot@bloombyday.com"
          git add social/ || true
          git commit -m "social: $(TZ=Australia/Brisbane date +%F)" || echo "nothing to commit"
          git pull --rebase origin ${{ github.ref_name }} || echo "rebase skipped"
          git push || echo "push failed (non-fatal) — images still available from prior commit"

      - name: Post to Instagram
        env:
          IG_USER_ID:      ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
        run: node post_instagram.js
