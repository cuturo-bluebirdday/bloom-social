name: Bloom Watch (daily)

# The alarm clock. Every morning this runs the satellite bloom pull and publishes
# the flags to Cloudflare KV, where the Bluebird worker reads them. No PC needed.

on:
  schedule:
    - cron: '0 18 * * *'        # 18:00 UTC daily  ≈  04:00 Brisbane (AEST, UTC+10)
  workflow_dispatch: {}          # also lets you run it by hand from the Actions tab

jobs:
  pull-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Get the code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install copernicusmarine xarray netcdf4 matplotlib pillow numpy global-land-mask scipy && python -c "from global_land_mask import globe; print('land mask OK')"

      - name: Pull satellite + score spots
        env:
          COPERNICUSMARINE_SERVICE_USERNAME: ${{ secrets.COPERNICUS_USERNAME }}
          COPERNICUSMARINE_SERVICE_PASSWORD: ${{ secrets.COPERNICUS_PASSWORD }}
        run: python bloom_watch_au.py

      - name: Render the bloom cloud
        env:
          COPERNICUSMARINE_SERVICE_USERNAME: ${{ secrets.COPERNICUS_USERNAME }}
          COPERNICUSMARINE_SERVICE_PASSWORD: ${{ secrets.COPERNICUS_PASSWORD }}
          # v1.3: creds so bloom_field.py can read the trend series straight from KV
          # (authoritative) instead of the flaky worker endpoint that froze the trend.
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_KV_NAMESPACE_ID: ${{ secrets.CF_KV_NAMESPACE_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: python bloom_field.py

      - name: Render the surface currents
        env:
          COPERNICUSMARINE_SERVICE_USERNAME: ${{ secrets.COPERNICUS_USERNAME }}
          COPERNICUSMARINE_SERVICE_PASSWORD: ${{ secrets.COPERNICUS_PASSWORD }}
        run: python bloom_currents.py


      - name: Render water clarity
        env:
          COPERNICUSMARINE_SERVICE_USERNAME: ${{ secrets.COPERNICUS_USERNAME }}
          COPERNICUSMARINE_SERVICE_PASSWORD: ${{ secrets.COPERNICUS_PASSWORD }}
        run: python bloom_clarity.py

      - name: Publish flags to Cloudflare KV
        run: |
          curl -sf -X PUT \
            "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CF_ACCOUNT_ID }}/storage/kv/namespaces/${{ secrets.CF_KV_NAMESPACE_ID }}/values/flags" \
            -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
            --data-binary @bloom_flags.json
          python -c "import json;d=json.load(open('bloom_flags.json'));print('Published',len(d['spots']),'spots, generated',d['generated'])"

      - name: Publish bloom cloud image to Cloudflare KV
        run: |
          curl -sf -X PUT \
            "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CF_ACCOUNT_ID }}/storage/kv/namespaces/${{ secrets.CF_KV_NAMESPACE_ID }}/values/field-png" \
            -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
            -H "Content-Type: application/octet-stream" \
            --data-binary @field.png
          echo "Published field.png ($(wc -c < field.png) bytes)"

      - name: Publish weekly trend to Cloudflare KV
        run: |
          if [ -f trend.json ]; then
            curl -sf -X PUT \
              "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CF_ACCOUNT_ID }}/storage/kv/namespaces/${{ secrets.CF_KV_NAMESPACE_ID }}/values/trend" \
              -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
              -H "Content-Type: application/json" \
              --data-binary @trend.json
            echo "Published trend.json ($(wc -c < trend.json) bytes)"
          else
            echo "no trend.json this run — skipping"
          fi


      - name: Publish water clarity to Cloudflare KV
        run: |
          curl -sf -X PUT \
            "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CF_ACCOUNT_ID }}/storage/kv/namespaces/${{ secrets.CF_KV_NAMESPACE_ID }}/values/clarity-png" \
            -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
            -H "Content-Type: application/octet-stream" \
            --data-binary @clarity.png
          echo "Published clarity.png ($(wc -c < clarity.png) bytes)"

      - name: Publish surface currents to Cloudflare KV
        run: |
          curl -sf -X PUT \
            "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CF_ACCOUNT_ID }}/storage/kv/namespaces/${{ secrets.CF_KV_NAMESPACE_ID }}/values/currents" \
            -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
            --data-binary @currents.json
          echo "Published currents.json ($(wc -c < currents.json) bytes)"
